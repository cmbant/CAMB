# Example parameters for SP(k) baryonic suppression
#
# This file sets SP(k) and Halofit options once the SPkNonLinear model is selected.

DEFAULT(params.ini)

output_root = test_spk

# Only compute matter power spectrum, skip CMB and lensing
get_scalar_cls = F
get_tensor_cls = F
get_transfer = T
do_lensing = F

# 0: linear, 1: non-linear matter power, 2: non-linear CMB lensing, 3: both
# SP(k) acts on top of the configured non-linear model.
do_nonlinear = 1

# Base non-linear model setting
# When SPk_feedback = T, use a non-feedback base model (halofit_version != 10).
# Supported values:
# 1=original, 2=bird, 3=peacock, 4=takahashi, 5=mead2016,
# 6=halomodel, 7=casarini, 8=mead2015, 9=mead2020, 10=mead2020_feedback
halofit_version = 9

# SP(k) switch and calibration choice
# SPk_SO must be 200 or 500.
# SPk_relation_kind: 1=power_law, 2=cosmo_power_law, 3=double_power_law.
SPk_feedback = T
SPk_SO = 200
SPk_relation_kind = 1

# relation_kind = 1 (power_law)
# SPk_fb_pivot is in M_sun.
SPk_fb_a = 0.40
SPk_fb_pow = 0.30
SPk_fb_pivot = 3.16227766e13

# relation_kind = 2 (cosmo_power_law)
# SPk_alpha = 3.6
# SPk_beta = 1.2
# SPk_gamma = 0.2

# relation_kind = 3 (double_power_law)
# SPk_m_pivot is in M_sun.
# SPk_epsilon = 0.60
# SPk_alpha = 0.1
# SPk_beta = 1.1
# SPk_gamma = 0.2
# SPk_m_pivot = 8.0e13

# Note: SP(k) is calibrated only over a finite k/z domain.
# Outside that domain, CAMB skips SP(k) at out-of-range z and clamps k to the
# calibrated k_max, printing warnings when feedback_level > 0.
