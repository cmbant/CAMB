# Example parameters for SP(k) baryonic suppression
#
# This file sets SP(k) and Halofit options once the SPkNonLinear model is selected.
# In Python, select it with:
#   pars.set_classes(non_linear_model='SPkNonLinear')

DEFAULT(params.ini)

output_root = test_spk

# Only compute matter power spectrum, skip CMB and lensing
get_scalar_cls = F
get_tensor_cls = F
get_transfer = T
do_lensing = F

# 0: linear, 1: non-linear matter power, 2: non-linear CMB lensing, 3: both
# SP(k) acts on top of the configured non-linear model.
do_nonlinear = 1

# Base non-linear model setting (default in this branch is mead2020)
# Keep this as a non-feedback mode when SPk_feedback = T.
# Values: 1=original, 4=takahashi, 5=mead2016, 8=mead2015, 9=mead2020, 10=mead2020_feedback
halofit_version = 9

# SP(k) switch and calibration choice
SPk_feedback = T
SPk_SO = 200
SPk_relation_kind = 1

# relation_kind = 1 (power_law)
SPk_fb_a = 0.40
SPk_fb_pow = 0.30
SPk_fb_pivot = 3.16227766e13

